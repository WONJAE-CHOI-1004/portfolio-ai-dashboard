# 매주 월요일 09:00 KST에 구독자 전원에게 각자 맞춤 리포트 발송.
# GitHub Actions(공개 저장소 무료)가 실행하므로 PC가 꺼져 있어도 나간다.
# 필요한 비밀값은 GitHub 저장소 Settings → Secrets and variables → Actions 에 저장.
name: weekly-user-reports

on:
  schedule:
    - cron: "0 0 * * 1" # UTC 00:00 월요일 = 한국시간 09:00 월요일
  workflow_dispatch: {} # 수동 실행 버튼(테스트용)

jobs:
  send-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send per-user reports
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          EMAIL_BACKEND: brevo
          EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          BASE_URL: ${{ secrets.BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python run_users_report.py
